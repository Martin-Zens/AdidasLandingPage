<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adidas Landing Page</title>

    <link href="https://db.onlinewebfonts.com/c/83c87eaab9535ea533cabc2f921bf64a?family=AdiHaus+Regular" rel="stylesheet"         type="text/css"/>
      

    <style>
 body, html {
  margin: 0;
  font-family: "AdiHaus Regular";
  display: flex;
  height: 100vh;
  width: 100%;
  background-image: url("https://assets.codepen.io/6060109/destop-bg.png");
}

.adidas-logo{
  display: flex;
  justify-content: center;
  margin: 2.5% 0;
}

.hero-image{
  display: flex;
  justify-content: center;
}

.athlete-image{
  background-image: url("https://assets.codepen.io/6060109/athlete-girl.png");
  background-repeat: no-repeat;
  background-size: auto;
  height: 250px;
  width: 376px;
}

.text-content{
  text-align: center;
  margin: 10% 3% 0 3%;
}

h2{
  margin: 2.5% 0;
  font-size: 48px;
  letter-spacing: 3px;
}

.text-content :nth-child(1){
  color: #CD3A24;
  font-weight: 100;
  position: relative;
}

.coming-soon{
  color: #423A3A;
  font-weight: 900;
  margin: 0;
}

p{
  line-height: 28px;
  color:#333333;
  margin-bottom: 0;
  font-size: 15px;
}

form{
  display: flex;
  justify-content: center;
  margin: 5% 0 10% 0%;
}

.text-input{
  padding: 0 30px;
  box-sizing: border-box;
  height: 50px;
  width: 70%;
  font-family: "AdiHaus Regular";
  font-size: 14px;
  color: #828282;
  border-radius: 5px 0px 0px 5px;
}

.submit-input{
  box-sizing: border-box;
  height: 50px;
  width: 17.5%;
  color: white;
  font-weight: bold;
  font-size: 16px;
  background-color: #2b2a33;
  border-radius: 0 5px 5px 0;
  border: none;
  
}

.dektop-image{
  display: none;
}

@media only screen and (min-width: 768px) {
  .athlete-image{
    display: none;
  }
  
  body{
    background-image: url(https://assets.codepen.io/6060109/athlete-girl.png");
      background-size: cover;
  }
  
  .all{
    width: 50%;
    margin-left: 5%;
  }
  .text-content{
    text-align: left; 
  }
  
  .dektop-image{
  display: block;
    width: 50%;
    background-image:        url("https://assets.codepen.io/6060109/athlete-girl.png"); 
    background-size:cover;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 35%                            100%);
}
  
.adidas-logo{
  display: flex;
  justify-content: flex-start;
  margin: 10% 2.5%;
}  
  
  form{
    display: flex;
    justify-content: flex-start;
    margin-left: 2.5%;
  }
}



    </style>
</head>
<body>

    
       
      
    <div class="all">
      <div class="adidas-logo">
        <img src="https://assets.codepen.io/6060109/2560px-Adidas_Logo+1.png" alt="adidas-logo">
      </div>
      
      <div class="hero-image">
        <div class="athlete-image"></div>
      </div>  
      
      <div class="text-content">
        <h2>WE'RE</h2>
        <h2 class="coming-soon">COMING</h2>
        <h2 class="coming-soon">SOON</h2>
        <p>Hello friends! We are currently building our new sports and comfort clothing store. Add your email address below to stay        up-to-date with announcements and our launch proposals.</p>
      </div>
      
      <form>
        <input class="text-input" type="text" placeholder="Email Adress">
        <input class="submit-input" type="submit" value="Go">
      </form>
    </div> 
      
        <div class="dektop-image"></div>
    
</body>
</html>
